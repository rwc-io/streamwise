# GitHub Actions workflow to test PRs, build the production web app, and validate Firestore rules (no deploy)
name: PR Test & Build

on:
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Build shared and server modules
        run: ./gradlew :shared:build :server:build

      - name: Run server and shared tests
        run: ./gradlew :shared:test :server:test

      - name: Install webApp dependencies
        run: |
          cd webApp
          npm ci

      - name: Build production web app
        run: |
          cd webApp
          ./gradlew build

      - name: Validate Firestore rules
        run: |
          firebase emulators:exec --project demo "echo Firestore rules validated" --only firestore --import ./tmp || firebase emulators:start --project demo --only firestore --export-on-exit=./tmp --test
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      # No deploy step for PRs
